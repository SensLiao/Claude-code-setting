    evidence_ref: ""
    status: missing
    owner: ""
    note: ""
  - control_id: V10
    requirement: "OAuth & OIDC (flows, PKCE, token handling, redirect validation)"
    evidence_ref: ""
    status: na
    owner: ""
    note: "Mark `na` if no OAuth/OIDC."
  - control_id: V11
    requirement: "Cryptography (algorithms, key management, randomness)"
    evidence_ref: ""
    status: missing
    owner: ""
    note: ""
  - control_id: V12
