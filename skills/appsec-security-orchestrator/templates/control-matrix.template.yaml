# =============================================================================
# Control Coverage Matrix — TEMPLATE (Enterprise module #5)
# =============================================================================
# Owned by: appsec-security-orchestrator (governance / compliance layer)
# Standards: OWASP ASVS 5.0 (V1-V17, primary axis) · NIST CSF 2.0 functions
#            · CIS Controls v8.1 (optional cross-ref)
#
# WHAT THIS IS
#   The HUMAN-CURATED control→evidence coverage matrix. Rows = ASVS 5.0 chapters
#   (plus optional CSF functions / CIS controls). For each control you record
#   what evidence proves it, the status, and the owner. This is the deliberate,
#   reviewed view of "what we actually cover".
#
# RELATIONSHIP TO `appsec-sdk control.coverage` (don't confuse the two):
#   - `appsec-sdk control.coverage <tag>` COMPUTES a coverage map AUTOMATICALLY
#     by aggregating ASVS chapter refs found across findings + code-review
#     evidence presence. Its statuses are: ASSESSED | REVIEW_NO_FINDING | NOT_ASSESSED.
#     It is honest-but-shallow: "did any finding/evidence touch this chapter?"
#   - THIS template is the CURATED complement: a human asserts covered/partial/
#     missing/na WITH a concrete evidence_ref per control. Use the SDK output as
#     an input/cross-check; a chapter the SDK marks NOT_ASSESSED should not be
#     `covered` here without a real evidence_ref explaining why.
#   Keep both: computed = drift detector, curated = accountable claim.
#
# ASVS 5.0 CHAPTERS (V1-V17) — names mirror appsec-sdk control.coverage exactly:
#   V1  Encoding & Sanitization              V10 OAuth & OIDC
#   V2  Validation & Business Logic          V11 Cryptography
#   V3  Web Frontend Security                V12 Communication
#   V4  API & Web Service                    V13 Configuration
#   V5  File Handling                        V14 Data Protection
#   V6  Authentication                       V15 Secure Coding & Architecture
#   V7  Session Management                   V16 Security Logging & Error Handling
#   V8  Authorization                        V17 WebRTC
#   V9  Self-contained Tokens
# =============================================================================

schema_version: "1.0"
artifact: control-matrix

metadata:
  project: "{{project name}}"
  release_tag: "{{release tag this matrix is asserted for}}"
  owner: "{{security owner}}"
  asserted_at: "{{YYYY-MM-DD}}"
  computed_coverage_ref: "{{path to `appsec-sdk control.coverage` output, for cross-check}}"
  asvs_target_level: 2                 # 1 | 2 | 3 — the level you are claiming against

# -----------------------------------------------------------------------------
# Primary axis: ASVS 5.0 chapters. One row per chapter (add per-requirement rows
# under sub_controls when you need finer granularity than chapter level).
#   status enum: covered | partial | missing | na
#     covered — control implemented AND evidenced (evidence_ref present)
#     partial — implemented for some surfaces / weaker than target level
#     missing — required at asvs_target_level but not implemented (→ finding/gap)
#     na      — not applicable to this system (justify in `note`)
# -----------------------------------------------------------------------------
asvs_controls:
  - control_id: V1
    requirement: "Encoding & Sanitization (output encoding, injection defense)"
    evidence_ref: ""                   # finding id / test name / file:line / code-review path
    status: missing
    owner: ""
    note: ""
  - control_id: V2
    requirement: "Validation & Business Logic (input validation, business-logic abuse)"
    evidence_ref: ""
    status: missing
    owner: ""
    note: ""
  - control_id: V3
    requirement: "Web Frontend Security (CSP, headers, clickjacking, CSRF)"
    evidence_ref: ""
    status: missing
    owner: ""
    note: ""
  - control_id: V4
    requirement: "API & Web Service (REST/GraphQL/RPC security, rate limiting)"
    evidence_ref: ""
    status: missing
    owner: ""
    note: ""
  - control_id: V5
    requirement: "File Handling (upload validation, content sniffing, storage)"
    evidence_ref: ""
    status: na                          # set covered/partial/missing if file upload exists
    owner: ""
    note: "Mark `na` only if the system handles no file upload/download."
  - control_id: V6
